name: paperflow
description: "PaperFlow - AI Academic Reader for Active Reading"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # PDF
  flutter_pdfview: ^1.3.2
  syncfusion_flutter_pdf: ^22.2.12

  # EPUB
  epubx: ^4.0.0

  # WebView
  webview_flutter: ^4.12.0

  # Network
  dio: ^5.7.0

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  share_plus: ^10.1.4
  file_selector: ^1.0.3
  permission_handler: ^11.3.1
  speech_to_text: ^7.0.0
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/readability.js
    - assets/prompts/
