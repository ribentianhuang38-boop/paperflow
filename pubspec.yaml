name: paperflow
description: "PaperFlow - AI Academic Reader for Active Reading"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # PDF (pdfrx handles both rendering and text extraction)
  pdfrx: ^2.4.4

  # EPUB
  epubx: ^4.0.0

  # HTML/Math rendering
  flutter_html: ^3.0.0
  flutter_math_fork: ^0.7.4
  webview_flutter: ^4.12.0

  # Network
  dio: ^5.7.0

  # Data classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  permission_handler: ^11.3.1
  speech_to_text: ^7.0.0
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2
  riverpod_lint: ^2.6.3
  drift_dev: ^2.24.0
  freezed: ^2.5.7
  json_serializable: ^6.9.2

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/
